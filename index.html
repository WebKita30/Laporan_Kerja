<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Kerja Borongan Kerjas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
      /* CSS TIDAK DIUBAH */
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Segoe UI;
        background: #f4f6f8;
        padding: 12px;
        margin: 0;
      }
      #auth-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1e3c72;
        color: white;
        text-align: center;
      }
      .auth-box {
        background: white;
        color: #333;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 380px;
      }
      #main-content {
        display: none;
      }
      .container {
        max-width: 1100px;
        margin: auto;
        background: #fff;
        padding: 16px;
        border-radius: 14px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      h1 {
        color: #1e3c72;
        margin: 0;
        font-size: 24px;
      }
      .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .form input,
      .form select,
      .form button {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }
      .form button {
        background: #1e3c72;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }
      .table-wrapper {
        max-height: 400px;
        overflow: auto;
        margin-top: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 520px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #1e3c72;
        color: #fff;
        padding: 8px;
        font-size: 13px;
      }
      td {
        padding: 6px;
        font-size: 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }
      .tanggal-row {
        background: #eef3ff;
        font-weight: bold;
        text-align: left;
      }
      .total-harian {
        background: #fafafa;
        font-weight: bold;
      }
      .btn-del {
        background: #e74c3c;
        color: #fff;
        border: none;
        padding: 4px 8px;
        border-radius: 6px;
        cursor: pointer;
      }
      .btn-pdf-hari {
        background: #2c3e50;
        color: white;
        border: none;
        padding: 4px 8px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
      }
      .btn {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-pdf {
        background: #34495e;
        color: #fff;
      }
      .btn-hapus {
        background: #c0392b;
        color: #fff;
      }
      .btn-logout {
        background: #ff4757;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
      }
      @media (max-width: 900px) {
        .form {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div id="auth-screen">
      <div class="auth-box" id="authBox">
        <h2>🔐 Kunci Perangkat</h2>
        <p>Masukkan Password untuk mengakses dashboard.</p>
        <input
          type="password"
          id="passInput"
          placeholder="Password Akses"
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
          "
        />
        <button
          onclick="cekLogin()"
          style="
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
          "
        >
          MASUK SISTEM
        </button>
      </div>
    </div>

    <div id="main-content">
      <div class="container">
        <div class="header-flex">
          <h1>📊 Dashboard Borongan</h1>
          <button class="btn-logout" onclick="logout()">🚪 KELUAR</button>
        </div>

        <div class="form">
          <input type="date" id="tanggal" />
          <select id="ukuran">
            <option value="">Pilih Ukuran</option>
            <option data-harga="10500">45–54 cm</option>
            <option data-harga="11400">55–64 cm</option>
            <option data-harga="12600">65–74 cm</option>
            <option data-harga="13600">75–84 cm</option>
            <option data-harga="17000">85–94 cm</option>
          </select>
          <input type="number" id="hasil" placeholder="Jumlah" />
          <button onclick="tambah()">Tambah</button>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Ukuran</th>
                <th>Harga</th>
                <th>Jumlah</th>
                <th>Total</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
          </table>
        </div>

        <button class="btn btn-pdf" onclick="downloadPDFSemua()">
          📥 DOWNLOAD PDF SEMUA DATA
        </button>
        <button class="btn btn-hapus" onclick="hapusSemua()">
          🗑️ HAPUS SEMUA DATA
        </button>
      </div>
    </div>

    <script>
      const PASSWORD_RAHASIA = "kerja2026";
      let data = JSON.parse(localStorage.getItem("borongan_db")) || [];

      const rupiahNormal = (n) => "Rp " + Number(n).toLocaleString("id-ID");
      const rupiahPotong = (n) =>
        "Rp " + (Number(n) / 1000).toLocaleString("id-ID");

      function getFingerprint() {
        return navigator.userAgent + screen.width + "x" + screen.height;
      }

      window.onload = function () {
        if (localStorage.getItem("is_logged_in") === "true") showDashboard();
        document.getElementById("tanggal").value = new Date()
          .toISOString()
          .slice(0, 10);
      };

      function cekLogin() {
        if (document.getElementById("passInput").value === PASSWORD_RAHASIA) {
          localStorage.setItem("is_logged_in", "true");
          showDashboard();
        } else alert("Password Salah!");
      }

      function logout() {
        localStorage.setItem("is_logged_in", "false");
        location.reload();
      }

      function showDashboard() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        render();
      }

      function hariTanggal(t) {
        return new Date(t).toLocaleDateString("id-ID", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function tambah() {
        const uk = document.getElementById("ukuran");
        const hasil = document.getElementById("hasil");
        const tgl = document.getElementById("tanggal").value;
        if (!uk.value || !hasil.value) return alert("Lengkapi data!");
        const harga = Number(uk.options[uk.selectedIndex].dataset.harga);

        data.push({
          id: Date.now(),
          tanggal: tgl,
          ukuran: uk.value,
          harga: harga,
          hasil: Number(hasil.value),
          total: harga * Number(hasil.value),
        });
        localStorage.setItem("borongan_db", JSON.stringify(data));
        uk.value = "";
        hasil.value = "";
        render();
      }

      function render() {
        const body = document.getElementById("tabelBody");
        body.innerHTML = "";
        let grandTotal = 0;

        const group = data.reduce((a, c) => {
          a[c.tanggal] = a[c.tanggal] || [];
          a[c.tanggal].push(c);
          return a;
        }, {});

        Object.keys(group)
          .sort()
          .reverse()
          .forEach((tgl) => {
            let harian = 0;

            /* ===== INI BAGIAN YANG DITAMBAHKAN ===== */
            body.innerHTML += `
<tr class="tanggal-row">
<td colspan="4">${hariTanggal(tgl)}</td>
<td>
<button class="btn-pdf-hari" onclick="downloadPDFHari('${tgl}')">
📄 Cetak PDF
</button>
</td>
</tr>`;

            /* ======================================= */

            group[tgl].forEach((d) => {
              harian += d.total;
              grandTotal += d.total;

              body.innerHTML += `
<tr>
<td>${d.ukuran}</td>
<td>${rupiahNormal(d.harga)}</td>
<td>${d.hasil}</td>
<td>${rupiahPotong(d.total)}</td>
<td><button class="btn-del" onclick="hapus(${d.id})">Hapus</button></td>
</tr>`;
            });

            body.innerHTML += `
<tr class="total-harian">
<td colspan="3">TOTAL PER HARI</td>
<td>${rupiahPotong(harian)}</td>
<td></td>
</tr>`;
          });

        body.innerHTML += `
<tr style="background:#1e3c72;color:white;font-weight:bold">
<td colspan="3">TOTAL KESELURUHAN</td>
<td>${rupiahPotong(grandTotal)}</td>
<td></td>
</tr>`;
      }

      function hapus(id) {
        data = data.filter((i) => i.id !== id);
        localStorage.setItem("borongan_db", JSON.stringify(data));
        render();
      }

      function hapusSemua() {
        if (confirm("Hapus semua data?")) {
          data = [];
          localStorage.removeItem("borongan_db");
          render();
        }
      }

      /* PDF FUNCTIONS TIDAK DIUBAH */
      function headerPDF(pdf, y) {
        pdf.setFillColor(30, 60, 114);
        pdf.setTextColor(255, 255, 255);
        pdf.rect(14, y, 182, 8, "F");
        pdf.text("Ukuran", 20, y + 6);
        pdf.text("Harga", 80, y + 6);
        pdf.text("Jumlah", 120, y + 6);
        pdf.text("Total", 160, y + 6);
        pdf.setTextColor(0, 0, 0);
        return y + 8;
      }

      function downloadPDFHari(tgl) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        let y = 30,
          total = 0;
        pdf.setFontSize(16);
        pdf.text("LAPORAN KERJA BORONGAN", 105, 15, { align: "center" });
        pdf.setFontSize(10);
        pdf.text("Tanggal: " + hariTanggal(tgl), 105, 22, { align: "center" });
        y = headerPDF(pdf, y);
        data
          .filter((d) => d.tanggal === tgl)
          .forEach((d) => {
            total += d.total;
            pdf.rect(14, y, 182, 8);
            pdf.text(d.ukuran, 20, y + 6);
            pdf.text(rupiahNormal(d.harga), 80, y + 6);
            pdf.text(String(d.hasil), 125, y + 6);
            pdf.text(rupiahPotong(d.total), 160, y + 6);
            y += 8;
          });
        pdf.rect(14, y, 182, 8);
        pdf.text("TOTAL", 20, y + 6);
        pdf.text(rupiahPotong(total), 160, y + 6);
        pdf.save("Laporan_" + tgl + ".pdf");
      }

      function downloadPDFSemua() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        let y = 30,
          grand = 0;
        pdf.setFontSize(16);
        pdf.text("LAPORAN KERJA BORONGAN", 105, 15, { align: "center" });
        y = headerPDF(pdf, y);
        data.forEach((d) => {
          if (y > 270) {
            pdf.addPage();
            y = 20;
            y = headerPDF(pdf, y);
          }
          grand += d.total;
          pdf.rect(14, y, 182, 8);
          pdf.text(d.ukuran + " (" + d.tanggal + ")", 20, y + 6);
          pdf.text(rupiahNormal(d.harga), 80, y + 6);
          pdf.text(String(d.hasil), 125, y + 6);
          pdf.text(rupiahPotong(d.total), 160, y + 6);
          y += 8;
        });
        pdf.rect(14, y, 182, 8);
        pdf.text("TOTAL KESELURUHAN", 20, y + 6);
        pdf.text(rupiahPotong(grand), 160, y + 6);
        pdf.save("Laporan_Semua_Data.pdf");
      }
    </script>
  </body>
</html>
