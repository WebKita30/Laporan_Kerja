<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Kerja Borongan Kerjas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f8;
        padding: 12px;
        margin: 0;
      }

      /* --- Area Login --- */
      #auth-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1e3c72;
        color: white;
        text-align: center;
      }
      .auth-box {
        background: white;
        color: #333;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 380px;
      }

      /* --- Dashboard Area --- */
      #main-content {
        display: none;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        background: #fff;
        padding: 16px;
        border-radius: 14px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      h1 {
        color: #1e3c72;
        margin: 0;
        font-size: 24px;
      }

      .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .form input,
      .form select,
      .form button {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
      }
      .form button {
        background: #1e3c72;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        border: none;
      }

      /* --- Table Styling --- */
      .table-wrapper {
        max-height: 500px;
        overflow: auto;
        margin-top: 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #1e3c72;
        color: #fff;
        padding: 12px;
        font-size: 13px;
        z-index: 10;
      }
      td {
        padding: 10px;
        font-size: 13px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }
      .tanggal-row {
        background: #eef3ff;
        font-weight: bold;
        text-align: left;
      }
      .total-harian {
        background: #f9f9f9;
        font-weight: bold;
        color: #2c3e50;
      }
      tfoot {
        display: none;
        background: #e9f7ef;
        font-weight: bold;
      }

      /* --- Buttons --- */
      .btn {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
      }
      .btn-total {
        background: #0c7c59;
        color: #fff;
      }
      .btn-pdf {
        background: #34495e;
        color: #fff;
      }
      .btn-hapus {
        background: #c0392b;
        color: #fff;
      }
      .btn-logout {
        background: #ff4757;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-del {
        background: #e74c3c;
        color: #fff;
        border: none;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      .history-card {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
        font-size: 12px;
        color: #666;
        border: 1px dashed #ccc;
      }

      @media (max-width: 900px) {
        .form {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div id="auth-screen">
      <div class="auth-box" id="authBox">
        <h2>🔐 Kunci Perangkat</h2>
        <p>Masukkan Password untuk mengakses dashboard.</p>
        <input
          type="password"
          id="passInput"
          placeholder="Password Akses"
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
          "
        />
        <button
          onclick="cekLogin()"
          style="
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          MASUK SISTEM
        </button>
      </div>
    </div>

    <div id="main-content">
      <div class="container">
        <div class="header-flex">
          <h1>📊 Dashboard Borongan</h1>
          <button class="btn-logout" onclick="logout()">🚪 KELUAR</button>
        </div>

        <div class="form">
          <input type="date" id="tanggal" />
          <select id="ukuran">
            <option value="">Pilih Ukuran</option>
            <option data-harga="10500">45–54 cm (Rp 10.500)</option>
            <option data-harga="11400">55–64 cm (Rp 11.400)</option>
            <option data-harga="12600">65–74 cm (Rp 12.600)</option>
            <option data-harga="13600">75–84 cm (Rp 13.600)</option>
            <option data-harga="17000">85–94 cm (Rp 17.000)</option>
          </select>
          <input type="number" id="hasil" placeholder="Jumlah" />
          <button onclick="tambah()">Tambah Data</button>
        </div>

        <div class="table-wrapper">
          <table id="myTable">
            <thead>
              <tr>
                <th>Ukuran</th>
                <th>Harga Satuan</th>
                <th>Jumlah</th>
                <th>Total</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
            <tfoot id="tfootTotal">
              <tr>
                <td colspan="3" style="text-align: right">
                  <b>TOTAL KESELURUHAN</b>
                </td>
                <td
                  id="totalKeseluruhan"
                  style="color: #27ae60; font-weight: bold"
                >
                  Rp 0
                </td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>

        <button class="btn btn-total" onclick="hitungTotalKeseluruhan()">
          🧮 HITUNG TOTAL AKHIR
        </button>
        <button class="btn btn-pdf" onclick="downloadPDF()">
          📥 DOWNLOAD LAPORAN PDF
        </button>
        <button class="btn btn-hapus" onclick="hapusSemua()">
          🗑️ KOSONGKAN SEMUA DATA
        </button>

        <div class="history-card">
          <strong>Keamanan:</strong> Sistem terkunci pada browser ini.
          <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0" />
          <button
            onclick="resetSistem()"
            style="
              background: #333;
              color: white;
              border: none;
              padding: 6px 10px;
              border-radius: 5px;
              cursor: pointer;
              font-size: 10px;
            "
          >
            RESET & PINDAH PERANGKAT
          </button>
        </div>
      </div>
    </div>

    <script>
      const PASSWORD_RAHASIA = "kerja2026";
      let data = JSON.parse(localStorage.getItem("borongan_db")) || [];
      const rupiah = (n) => "Rp " + Number(n).toLocaleString("id-ID");

      // --- LOGIN & SECURITY ---
      function getFingerprint() {
        return navigator.userAgent + screen.width + "x" + screen.height;
      }

      window.onload = function () {
        const lockedID = localStorage.getItem("device_id_locked");
        const currentID = getFingerprint();
        const isLoggedIn = localStorage.getItem("is_logged_in");

        if (lockedID && lockedID !== currentID) {
          document.getElementById("authBox").innerHTML =
            "<h2 style='color:red'>🚫 AKSES DITOLAK</h2><p>Perangkat ini tidak memiliki izin akses.</p>";
          return;
        }

        if (isLoggedIn === "true") {
          showDashboard();
        }
        document.getElementById("tanggal").value = new Date()
          .toISOString()
          .slice(0, 10);
      };

      function cekLogin() {
        const input = document.getElementById("passInput").value;
        if (input === PASSWORD_RAHASIA) {
          localStorage.setItem("device_id_locked", getFingerprint());
          localStorage.setItem("is_logged_in", "true");
          showDashboard();
        } else {
          alert("Password Salah!");
        }
      }

      function logout() {
        if (confirm("Keluar dari sistem?")) {
          localStorage.setItem("is_logged_in", "false");
          location.reload();
        }
      }

      function showDashboard() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        render();
      }

      function resetSistem() {
        if (
          confirm(
            "PERINGATAN: Ini akan menghapus semua data dan reset kunci perangkat! Lanjutkan?",
          )
        ) {
          localStorage.clear();
          location.reload();
        }
      }

      // --- CORE LOGIC ---
      function hariTanggal(t) {
        const opsi = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        return new Date(t).toLocaleDateString("id-ID", opsi);
      }

      function tambah() {
        const uk = document.getElementById("ukuran");
        const hasil = document.getElementById("hasil");
        const tgl = document.getElementById("tanggal").value;

        if (!uk.value || !hasil.value)
          return alert("Mohon isi Ukuran dan Jumlah!");

        const hargaSatuan = Number(uk.options[uk.selectedIndex].dataset.harga);
        data.push({
          id: Date.now(),
          tanggal: tgl,
          ukuran: uk.value,
          harga: hargaSatuan,
          hasil: Number(hasil.value),
          total: hargaSatuan * Number(hasil.value),
        });

        localStorage.setItem("borongan_db", JSON.stringify(data));
        uk.value = "";
        hasil.value = "";
        document.getElementById("tfootTotal").style.display = "none";
        render();
      }

      function render() {
        const body = document.getElementById("tabelBody");
        body.innerHTML = "";

        // Kelompokkan data berdasarkan tanggal
        const group = data.reduce((acc, curr) => {
          acc[curr.tanggal] = acc[curr.tanggal] || [];
          acc[curr.tanggal].push(curr);
          return acc;
        }, {});

        // Urutkan tanggal terbaru di atas
        Object.keys(group)
          .sort()
          .reverse()
          .forEach((tgl) => {
            let harian = 0;
            body.innerHTML += `<tr class="tanggal-row"><td colspan="5">📅 ${hariTanggal(tgl)}</td></tr>`;

            group[tgl].forEach((d) => {
              harian += d.total;
              body.innerHTML += `
              <tr>
                <td>${d.ukuran}</td>
                <td>${rupiah(d.harga)}</td>
                <td>${d.hasil}</td>
                <td>${rupiah(d.total)}</td>
                <td><button class="btn-del" onclick="hapus(${d.id})">✕</button></td>
              </tr>`;
            });
            body.innerHTML += `<tr class="total-harian"><td colspan="3" style="text-align:right">Subtotal Hari Ini:</td><td>${rupiah(harian)}</td><td></td></tr>`;
          });
      }

      function hapus(id) {
        data = data.filter((i) => i.id !== id);
        localStorage.setItem("borongan_db", JSON.stringify(data));
        render();
      }

      function hapusSemua() {
        if (data.length && confirm("Hapus permanen semua data di tabel?")) {
          data = [];
          localStorage.removeItem("borongan_db");
          render();
        }
      }

      function hitungTotalKeseluruhan() {
        if (!data.length) return alert("Tidak ada data untuk dihitung.");
        const total = data.reduce((a, b) => a + b.total, 0);
        document.getElementById("totalKeseluruhan").innerText = rupiah(total);
        document.getElementById("tfootTotal").style.display =
          "table-footer-group";
      }

      // --- PDF GENERATOR (Auto-Pagination) ---
      function downloadPDF() {
        if (!data.length) return alert("Data kosong!");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let grandTotal = 0;

        // Judul Laporan
        doc.setFontSize(18);
        doc.text("LAPORAN KERJA BORONGAN", 105, 15, { align: "center" });
        doc.setFontSize(10);
        doc.text("Dicetak pada: " + new Date().toLocaleString(), 105, 22, {
          align: "center",
        });

        // Siapkan Baris Data
        const sortedData = [...data].sort(
          (a, b) => new Date(a.tanggal) - new Date(b.tanggal),
        );
        const tableRows = [];
        sortedData.forEach((d) => {
          grandTotal += d.total;
          tableRows.push([
            d.tanggal,
            d.ukuran,
            rupiah(d.harga),
            d.hasil,
            rupiah(d.total),
          ]);
        });

        // Buat Tabel Otomatis (Bisa lebih dari 1 halaman)
        doc.autoTable({
          startY: 30,
          head: [["Tanggal", "Ukuran", "Harga", "Jumlah", "Subtotal"]],
          body: tableRows,
          theme: "grid",
          headStyles: { fillColor: [30, 60, 114], halign: "center" },
          columnStyles: {
            2: { halign: "right" },
            3: { halign: "center" },
            4: { halign: "right" },
          },
          foot: [
            [
              {
                content: "TOTAL KESELURUHAN",
                colSpan: 4,
                styles: { halign: "right", fontStyle: "bold" },
              },
              {
                content: rupiah(grandTotal),
                styles: { fontStyle: "bold", halign: "right" },
              },
            ],
          ],
        });

        doc.save(
          `Laporan_Borongan_${new Date().toISOString().slice(0, 10)}.pdf`,
        );
      }
    </script>
  </body>
</html>
