<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard Kerja Borongan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: "Segoe UI", sans-serif; background: #f4f6f8; padding: 12px; margin: 0; }
        
        /* Auth Screen */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #1e3c72; color: white; }
        .auth-box { background: white; color: #333; padding: 30px; border-radius: 15px; width: 100%; max-width: 380px; text-align: center; }
        
        /* Main Dashboard */
        #main-content { display: none; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Form Styling */
        .form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .form input, .form select, .form button { padding: 12px; border-radius: 10px; border: 1px solid #ccc; outline: none; }
        .form button { background: #1e3c72; color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Table Dashboard */
        .table-wrapper { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #1e3c72; color: white; padding: 12px; font-size: 14px; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
        .tanggal-row { background: #eef3ff; font-weight: bold; text-align: left; padding-left: 15px; }
        .total-harian { background: #fafafa; font-weight: bold; color: #2c3e50; }

        /* Summary Dashboard */
        .tfoot-style { background: #e9f7ef; font-weight: bold; display: none; }

        /* Buttons */
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-total { background: #0c7c59; color: white; }
        .btn-pdf { background: #34495e; color: white; }
        .btn-hapus { background: #c0392b; color: white; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>🔐 Login Sistem</h2>
            <input type="password" id="passInput" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">
            <button onclick="cekLogin()" style="width:100%; padding:12px; background:#1e3c72; color:white; border:none; border-radius:8px; cursor:pointer;">MASUK</button>
        </div>
    </div>

    <div id="main-content">
        <div class="container">
            <div class="header-flex">
                <h1 style="color:#1e3c72">📊 Dashboard Borongan</h1>
                <button onclick="logout()" style="background:#ff4757; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">Keluar</button>
            </div>

            <div class="form">
                <input type="date" id="tanggal">
                <select id="ukuran">
                    <option value="">Pilih Ukuran</option>
                    <option data-harga="10.5">45–54 cm</option>
                    <option data-harga="11.4">55–64 cm</option>
                    <option data-harga="12.6">65–74 cm</option>
                    <option data-harga="13.6">75–84 cm</option>
                    <option data-harga="17">85–94 cm</option>
                </select>
                <input type="number" id="hasil" placeholder="Jumlah">
                <button onclick="tambah()">Tambah Data</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Ukuran</th>
                            <th>Harga</th>
                            <th>Jumlah</th>
                            <th>Total</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody"></tbody>
                    <tfoot id="tfootTotal" class="tfoot-style">
                        <tr>
                            <td colspan="3" style="text-align: right; padding-right: 20px;">TOTAL KESELURUHAN</td>
                            <td id="totalKeseluruhanText">Rp 0</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <button class="btn btn-total" onclick="hitungTotalKeseluruhan()">🧮 TOTALKAN KESELURUHAN</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">📥 DOWNLOAD PDF LAPORAN</button>
            <button class="btn btn-hapus" onclick="hapusSemua()">🗑️ HAPUS SEMUA DATA</button>
        </div>
    </div>

    <script>
        const PASSWORD_RAHASIA = "kerja2026";
        let data = JSON.parse(localStorage.getItem("borongan_db")) || [];
        const rupiah = (n) => "Rp " + Number(n).toLocaleString("id-ID");

        window.onload = function() {
            if (localStorage.getItem("is_logged_in") === "true") showDashboard();
            document.getElementById("tanggal").value = new Date().toISOString().slice(0, 10);
        };

        function cekLogin() {
            if (document.getElementById("passInput").value === PASSWORD_RAHASIA) {
                localStorage.setItem("is_logged_in", "true");
                showDashboard();
            } else { alert("Password Salah!"); }
        }

        function logout() {
            localStorage.setItem("is_logged_in", "false");
            location.reload();
        }

        function showDashboard() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            render();
        }

        function hariTanggal(t) {
            return new Date(t).toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
        }

        function tambah() {
            const uk = document.getElementById("ukuran");
            const hasil = document.getElementById("hasil");
            const tgl = document.getElementById("tanggal").value;
            if (!uk.value || !hasil.value) return alert("Lengkapi data!");

            const harga = Number(uk.options[uk.selectedIndex].dataset.harga);
            data.push({ id: Date.now(), tanggal: tgl, ukuran: uk.value, harga: harga, hasil: Number(hasil.value), total: harga * Number(hasil.value) });
            localStorage.setItem("borongan_db", JSON.stringify(data));
            uk.value = ""; hasil.value = "";
            document.getElementById("tfootTotal").style.display = "none";
            render();
        }

        function render() {
            const body = document.getElementById("tabelBody");
            body.innerHTML = "";
            const group = data.reduce((acc, curr) => {
                acc[curr.tanggal] = acc[curr.tanggal] || [];
                acc[curr.tanggal].push(curr);
                return acc;
            }, {});

            Object.keys(group).sort().reverse().forEach((tgl) => {
                let harian = 0;
                body.innerHTML += `<tr class="tanggal-row"><td colspan="5">${hariTanggal(tgl)}</td></tr>`;
                group[tgl].forEach((d) => {
                    harian += d.total;
                    body.innerHTML += `<tr><td>${d.ukuran}</td><td>${rupiah(d.harga)}</td><td>${d.hasil}</td><td>${rupiah(d.total)}</td><td><button class="btn-del" onclick="hapus(${d.id})">Hapus</button></td></tr>`;
                });
                body.innerHTML += `<tr class="total-harian"><td colspan="3" style="text-align:right; padding-right:20px;">TOTAL PER HARI</td><td>${rupiah(harian)}</td><td></td></tr>`;
            });
        }

        function hapus(id) {
            data = data.filter(i => i.id !== id);
            localStorage.setItem("borongan_db", JSON.stringify(data));
            document.getElementById("tfootTotal").style.display = "none";
            render();
        }

        function hapusSemua() {
            if (confirm("Hapus semua data?")) { data = []; localStorage.removeItem("borongan_db"); document.getElementById("tfootTotal").style.display = "none"; render(); }
        }

        function hitungTotalKeseluruhan() {
            if (data.length === 0) return alert("Belum ada data.");
            const grand = data.reduce((a, b) => a + b.total, 0);
            document.getElementById("totalKeseluruhanText").innerText = rupiah(grand);
            document.getElementById("tfootTotal").style.display = "table-footer-group";
        }

        // FUNGSI PDF - OTOMATIS PER HALAMAN & RAPI
        function downloadPDF() {
            if (data.length === 0) return alert("Data kosong!");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            // Header Laporan
            doc.setFontSize(18);
            doc.setTextColor(30, 60, 114);
            doc.text("LAPORAN KERJA BORONGAN", 105, 15, { align: "center" });
            
            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text("Dicetak pada: " + new Date().toLocaleString("id-ID"), 105, 22, { align: "center" });

            // Pengelompokan Data
            const group = data.reduce((acc, curr) => {
                acc[curr.tanggal] = acc[curr.tanggal] || [];
                acc[curr.tanggal].push(curr);
                return acc;
            }, {});

            const tableRows = [];
            let grandTotal = 0;
            const sortedDates = Object.keys(group).sort();

            sortedDates.forEach((tgl) => {
                let totalHarian = 0;
                // Baris Tanggal (Separator)
                tableRows.push([{ content: hariTanggal(tgl).toUpperCase(), colSpan: 4, styles: { halign: 'center', fillColor: [230, 230, 230], fontStyle: 'bold', textColor: [0, 0, 0] } }]);
                
                group[tgl].forEach((item) => {
                    totalHarian += item.total;
                    grandTotal += item.total;
                    tableRows.push([item.ukuran, rupiah(item.harga), item.hasil.toString(), rupiah(item.total)]);
                });

                // Baris Subtotal Harian
                tableRows.push([{ content: "TOTAL HARIAN", colSpan: 3, styles: { halign: 'right', fontStyle: 'bold' } }, { content: rupiah(totalHarian), styles: { fontStyle: 'bold' } }]);
            });

            // Baris Grand Total (Paling Bawah)
            tableRows.push([{ content: "GRAND TOTAL (TOTAL KESELURUHAN)", colSpan: 3, styles: { halign: 'right', fillColor: [30, 60, 114], textColor: 255, fontStyle: 'bold' } }, { content: rupiah(grandTotal), styles: { fillColor: [30, 60, 114], textColor: 255, fontStyle: 'bold' } }]);

            // Render Tabel Otomatis
            doc.autoTable({
                startY: 30,
                head: [['Ukuran Barang', 'Harga Satuan', 'Jumlah Item', 'Sub Total']],
                body: tableRows,
                theme: 'grid',
                headStyles: { fillColor: [30, 60, 114], halign: 'center', valign: 'middle', fontSize: 10 },
                columnStyles: { 0: { halign: 'center' }, 1: { halign: 'center' }, 2: { halign: 'center' }, 3: { halign: 'center' } },
                styles: { fontSize: 9, cellPadding: 3 },
                margin: { top: 25, bottom: 20 },
                // Fungsi ini menangani jika ada halaman baru
                didDrawPage: function (data) {
                    doc.setFontSize(8);
                    doc.text("Halaman " + doc.internal.getNumberOfPages(), data.settings.margin.left, doc.internal.pageSize.height - 10);
                }
            });

            doc.save(`Laporan_Borongan_${new Date().getTime()}.pdf`);
        }
    </script>
</body>
</html>
